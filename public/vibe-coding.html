<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Coding - 向金涛</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=ZCOOL+KaiTi&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'ZCOOL KaiTi', KaiTi, STKaiti, serif;
      background-color: #faf7f0;
      color: #2c2416;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZURpcmVjdGlvbj0iMC44IiBzdGl0Y2hUaWxlcz0ic3RpdGNoIi8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsdGVyPSJ1cmwoI24pIi8+PC9zdmc+');
      opacity: 0.04;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 20px;
      position: relative;
      z-index: 1;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 40px;
      color: #8b6f47;
      text-decoration: none;
      font-size: 0.9rem;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(139, 111, 71, 0.2);
      transition: all 0.2s;
    }
    .back-link:hover {
      background: rgba(139, 111, 71, 0.08);
      border-color: rgba(139, 111, 71, 0.35);
    }

    h1 {
      text-align: center;
      font-family: Merriweather, 'ZCOOL KaiTi', serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #2c2416;
    }

    .subtitle {
      text-align: center;
      color: #8b6f47;
      margin-bottom: 48px;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 1.5rem; }
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.3s;
      opacity: 0;
      transform: translateY(20px);
      animation: reveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(139, 111, 71, 0.1);
    }

    .card img {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      display: block;
      cursor: pointer;
      transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .card:hover img { transform: scale(1.03); }

    .card-body {
      padding: 16px 20px;
    }
    .card-body h3 {
      font-family: Merriweather, 'ZCOOL KaiTi', serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #2c2416;
    }
    .card-body p {
      font-size: 0.85rem;
      color: #8b6f47;
      line-height: 1.6;
    }

    .footer {
      text-align: center;
      color: rgba(139, 111, 71, 0.5);
      font-size: 0.75rem;
      padding: 48px 0 24px;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .lightbox.active {
      display: flex;
      opacity: 1;
    }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 12px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">&larr; 返回主页</a>
    <h1>Vibe Coding</h1>
    <p class="subtitle">我的 AI 辅助开发工作流</p>
    <div class="grid">
      <div class="card">
        <img src="/vibe-coding-1.jpg" alt="Gemini Ultra" onclick="openLightbox(this.src)">
        <div class="card-body">
          <h3>Gemini Ultra</h3>
          <p>Google Gemini Ultra 会员，用于高级 AI 能力。</p>
        </div>
      </div>
      <div class="card">
        <img src="/vibe-coding-2.jpg" alt="Claude Code Max" onclick="openLightbox(this.src)">
        <div class="card-body">
          <h3>Claude Code Max</h3>
          <p>Claude Code Max 计划，20 倍用量 — Opus 4.6 + 100 万上下文。</p>
        </div>
      </div>
      <div class="card">
        <img src="/vibe-coding-3.jpg" alt="多实例 Claude Code" onclick="openLightbox(this.src)">
        <div class="card-body">
          <h3>多实例 Claude Code</h3>
          <p>同时运行多个 Claude Code 实例，最大化生产力。</p>
        </div>
      </div>
      <div class="card">
        <img src="/vibe-coding-4.png" alt="Agent Team 模式" onclick="openLightbox(this.src)">
        <div class="card-body">
          <h3>Agent Team 模式</h3>
          <p>多个 AI Agent 并行协作，分工处理不同任务。</p>
        </div>
      </div>
    </div>
    <div class="footer">
      <p>&copy; 2026 向金涛</p>
    </div>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Preview">
  </div>

  <script>
    function openLightbox(src) {
      const lb = document.getElementById('lightbox');
      document.getElementById('lightbox-img').src = src;
      lb.style.display = 'flex';
      requestAnimationFrame(() => lb.classList.add('active'));
    }
    function closeLightbox() {
      const lb = document.getElementById('lightbox');
      lb.classList.remove('active');
      setTimeout(() => lb.style.display = 'none', 300);
    }
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
